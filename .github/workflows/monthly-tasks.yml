name: Monthly HR Tasks

on:
  schedule:
    # Cairo alternates between UTC+2 and UTC+3. Both schedules are safe because
    # the script runs only on day 26 and the finalized cycle document is idempotent.
    - cron: '5 21 * * *'
    - cron: '5 22 * * *'
  workflow_dispatch:
    inputs:
      cycle_key:
        description: 'Optional cycle to close (YYYY-MM)'
        required: false
        type: string
      force:
        description: 'Allow a manual close outside day 26'
        required: true
        default: false
        type: boolean

jobs:
  run-monthly-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Dependencies
        working-directory: ./scripts
        run: npm ci

      - name: Run Monthly Tasks Script
        working-directory: ./scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROCESS_CYCLE_KEY: ${{ inputs.cycle_key }}
          FORCE_MONTHLY_CLOSE: ${{ inputs.force }}
        run: node monthly-tasks.js
