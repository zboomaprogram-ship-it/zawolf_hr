name: Update User Emails

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run without writing to Firebase
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      normalize_emails:
        description: Convert target emails to lowercase before updating
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      fail_on_unmatched:
        description: Fail if a mapping row does not have an employeeId
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  update-user-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Dependencies
        working-directory: ./scripts
        run: npm ci

      - name: Update User Emails
        working-directory: ./scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DRY_RUN: ${{ inputs.dry_run }}
          NORMALIZE_EMAILS: ${{ inputs.normalize_emails }}
          FAIL_ON_UNMATCHED: ${{ inputs.fail_on_unmatched }}
          EMAIL_UPDATES_CSV: ./email_updates.csv
        run: node update-user-emails.js
