name: Daily HR Tasks

on:
  schedule:
    # Runs at 20:55 UTC (11:55 PM Egypt Time) every day
    - cron: '55 20 * * *'
  workflow_dispatch: # Allows manual trigger from UI

jobs:
  run-daily-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        working-directory: ./scripts
        run: npm ci

      - name: Run Daily Tasks Script
        working-directory: ./scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
        run: node daily-tasks.js
