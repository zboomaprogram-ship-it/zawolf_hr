name: Daily HR Tasks

on:
  schedule:
    # Run at both possible UTC offsets, then let the script keep only 08:00
    # Cairo. This remains correct across Egypt daylight-saving changes.
    - cron: '0 5,6 * * *'
  workflow_dispatch: # Allows manual trigger from UI

jobs:
  run-daily-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Dependencies
        working-directory: ./scripts
        run: npm ci

      - name: Run Daily Tasks Script
        working-directory: ./scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_API_KEY: ${{ secrets.ONESIGNAL_REST_API_KEY }}
          REQUIRE_CAIRO_HOUR: ${{ github.event_name == 'schedule' && '8' || '' }}
        run: node daily-tasks.js
