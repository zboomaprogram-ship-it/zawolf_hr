name: Import Employee Accounts

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run without writing to Firebase
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  import-employees:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Dependencies
        working-directory: ./scripts
        run: npm ci

      - name: Import Employees
        working-directory: ./scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DRY_RUN: ${{ inputs.dry_run }}
          IMPORT_CSV_PATH: ../zawolf_employee_accounts_import.csv
        run: node import-employees.js
