name: Reset Absence And Discipline Metrics

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview affected records without changing Firebase
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      month_key:
        description: Month to reset as YYYY-MM; leave empty for current Cairo month
        required: false
        type: string
      confirmation:
        description: For a live reset, enter RESET_CURRENT_MONTH_ATTENDANCE_METRICS
        required: false
        type: string

jobs:
  reset-attendance-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Dependencies
        working-directory: ./scripts
        run: npm ci

      - name: Reset Absence And Discipline Metrics
        working-directory: ./scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DRY_RUN: ${{ inputs.dry_run }}
          MONTH_KEY: ${{ inputs.month_key }}
          RESET_CONFIRMATION: ${{ inputs.confirmation }}
        run: node reset-attendance-metrics.js
